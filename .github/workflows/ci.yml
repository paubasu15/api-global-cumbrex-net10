name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CumbrexSaaS.slnx

      - name: Build
        run: dotnet build CumbrexSaaS.slnx --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test tests/Unit.Tests/Unit.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Unit

      - name: Run Architecture Tests
        run: |
          dotnet test tests/Architecture.Tests/Architecture.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=arch-test-results.trx" \
            --results-directory ./TestResults/Architecture

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./TestResults/**/*.xml
          fail_ci_if_error: false
